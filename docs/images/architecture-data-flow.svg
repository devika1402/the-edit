<text x="40.0" y="-30.2" font-family="Lilita One" font-size="28" fill="#1e1e1e" text-anchor="start">H&amp;M Recommender: Data Flow</text>
<text x="40.0" y="-3.0" font-family="Lilita One" font-size="16" fill="#868e96" text-anchor="start">(from docs/ARCHITECTURE.md)</text>
<text x="540.0" y="65.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">Raw H&amp;M CSVs</text>
<text x="540.0" y="85.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">(Cloud Storage)</text>
<text x="540.0" y="195.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">raw_* tables in BigQuery</text>
<text x="540.0" y="305.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">Staging:</text>
<text x="540.0" y="325.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">stg_transactions, stg_articles, stg_customers</text>
<text x="240.0" y="435.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">Feature tables:</text>
<text x="240.0" y="455.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">feat_customer, feat_item</text>
<text x="860.0" y="435.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">item_copurchase:</text>
<text x="860.0" y="455.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">windowed self-join</text>
<text x="540.0" y="555.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">candidates:</text>
<text x="540.0" y="575.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">a few hundred per customer</text>
<text x="540.0" y="665.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">Training matrix:</text>
<text x="540.0" y="685.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">candidates joined to features,</text>
<text x="540.0" y="705.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">with the holdout label</text>
<text x="540.0" y="805.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">CatBoost ranker</text>
<text x="210.0" y="920.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">Evaluation:</text>
<text x="210.0" y="940.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">MAP@12, Recall@12, NDCG@12,</text>
<text x="210.0" y="960.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">bootstrap CIs</text>
<text x="540.0" y="920.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">Guardrails:</text>
<text x="540.0" y="940.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">beyond-accuracy metrics +</text>
<text x="540.0" y="960.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">diversity re-ranker</text>
<text x="890.0" y="930.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">FastAPI endpoint +</text>
<text x="890.0" y="950.6" font-family="Lilita One" font-size="16" fill="#1e1e1e" text-anchor="middle">/demo page</text>
